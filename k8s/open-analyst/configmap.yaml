apiVersion: v1
kind: ConfigMap
metadata:
  name: open-analyst-config
  namespace: open-analyst
data:
  # Internal service URLs (pod-to-pod within the cluster)
  LANGGRAPH_RUNTIME_URL: "http://runtime:8081"
  ANALYST_MCP_BASE_URL: "http://analyst-mcp:8000"

  # Browser-facing URL — set to the ALB/ingress URL after deployment
  # The browser connects directly to the runtime for streaming;
  # path-based ingress routing sends /threads, /runs, etc. to the runtime
  LANGGRAPH_RUNTIME_PUBLIC_URL: "https://analyst.insights.arlis.umd.edu"
  OPEN_ANALYST_WEB_URL: "https://analyst.insights.arlis.umd.edu"
  OPEN_ANALYST_WEB_PORT: "5173"

  # LiteLLM gateway (external, already persistent)
  LITELLM_BASE_URL: "https://gateway.ai-ops.umd-arlis.org"
  LITELLM_CHAT_MODEL: "bedrock-claude-sonnet-4"
  LITELLM_EMBEDDING_MODEL: "bedrock-titan-embed-text"

  # Analyst MCP config
  ANALYST_MCP_HOST: "0.0.0.0"
  ANALYST_MCP_PORT: "8000"
  ANALYST_MCP_LITELLM_BASE_URL: "https://gateway.ai-ops.umd-arlis.org"
  ANALYST_MCP_LITELLM_CHAT_MODEL: "bedrock-claude-sonnet-4"
  ANALYST_MCP_LITELLM_EMBEDDING_MODEL: "bedrock-titan-embed-text"

  # Auth (Keycloak)
  AUTH_ENABLED: "true"
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "open-analyst"
  KEYCLOAK_CLIENT_ID: "open-analyst-web"

  # Artifact storage (S3)
  ARTIFACT_STORAGE_BACKEND: "s3"
  ARTIFACT_S3_BUCKET: "open-analyst-test"
  ARTIFACT_S3_REGION: "us-east-1"
  ARTIFACT_S3_PREFIX: "open-analyst-vnext"
