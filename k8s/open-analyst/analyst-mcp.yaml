apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyst-mcp
  namespace: open-analyst
  labels:
    app: analyst-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyst-mcp
  template:
    metadata:
      labels:
        app: analyst-mcp
    spec:
      serviceAccountName: open-analyst
      containers:
        - name: analyst-mcp
          image: 718277288702.dkr.ecr.us-east-1.amazonaws.com/open-analyst/analyst-mcp:v2
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: open-analyst-config
            - secretRef:
                name: open-analyst-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analyst-mcp
  namespace: open-analyst
spec:
  selector:
    app: analyst-mcp
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
