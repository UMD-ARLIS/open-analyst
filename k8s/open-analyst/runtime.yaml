apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime
  namespace: open-analyst
  labels:
    app: runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runtime
  template:
    metadata:
      labels:
        app: runtime
    spec:
      serviceAccountName: open-analyst
      containers:
        - name: runtime
          image: 718277288702.dkr.ecr.us-east-1.amazonaws.com/open-analyst/runtime:20260416-113057
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: open-analyst-config
            - secretRef:
                name: open-analyst-secrets
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8081"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://analyst.insights.arlis.umd.edu"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: runtime
  namespace: open-analyst
spec:
  selector:
    app: runtime
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  type: ClusterIP
