apiVersion: v1
kind: ConfigMap
metadata:
  name: open-analyst-config
  namespace: open-analyst
data:
  LANGGRAPH_RUNTIME_URL: "http://runtime:8081"
  ANALYST_MCP_BASE_URL: "http://analyst-mcp:8000"
  LANGGRAPH_RUNTIME_PUBLIC_URL: "http://open-analyst.localtest.me"
  OPEN_ANALYST_WEB_URL: "http://open-analyst.localtest.me"
  OPEN_ANALYST_WEB_PORT: "80"
  ANALYST_MCP_HOST: "0.0.0.0"
  ANALYST_MCP_PORT: "8000"
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "open-analyst"
  KEYCLOAK_CLIENT_ID: "open-analyst-web"
  ARTIFACT_STORAGE_BACKEND: "s3"
  ARTIFACT_S3_BUCKET: "open-analyst-local"
  ARTIFACT_S3_REGION: "us-east-1"
  ARTIFACT_S3_PREFIX: "open-analyst-vnext"
  ARTIFACT_S3_ENDPOINT: "http://minio:9000"
  CORS_ALLOWED_ORIGINS: "http://open-analyst.localtest.me,http://localhost:8081"
