apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-analyst
  namespace: open-analyst
  annotations:
    $patch: replace
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: open-analyst.localtest.me
      http:
        paths:
          - path: /threads
            pathType: Prefix
            backend:
              service:
                name: runtime
                port:
                  number: 8081
          - path: /assistants
            pathType: Prefix
            backend:
              service:
                name: runtime
                port:
                  number: 8081
          - path: /runs
            pathType: Prefix
            backend:
              service:
                name: runtime
                port:
                  number: 8081
          - path: /store
            pathType: Prefix
            backend:
              service:
                name: runtime
                port:
                  number: 8081
          - path: /health
            pathType: Exact
            backend:
              service:
                name: runtime
                port:
                  number: 8081
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          - path: /js
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webapp
                port:
                  number: 5173
