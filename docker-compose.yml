services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: open-analyst-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: open_analyst
      POSTGRES_PASSWORD: open_analyst_dev
      POSTGRES_DB: open_analyst
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_analyst"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
