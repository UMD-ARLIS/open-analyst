# Local development stack.
#
# 1. Copy .env.example to .env and fill in required values.
# 2. Run: docker compose up -d
#
# All services read .env for configuration.  Set DATABASE_URL,
# LANGGRAPH_RUNTIME_URL, ANALYST_MCP_BASE_URL, and storage paths
# in .env to match your environment (local, external Postgres, S3, etc.).
#
# The postgres service below is optional — omit it if you use an
# external database and just set DATABASE_URL accordingly.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: open-analyst-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: open_analyst
      POSTGRES_PASSWORD: open_analyst_dev
      POSTGRES_DB: open_analyst
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_analyst"]
      interval: 5s
      timeout: 5s
      retries: 5

  webapp:
    build: .
    ports:
      - "5173:5173"
    depends_on:
      postgres:
        condition: service_healthy
      runtime:
        condition: service_started
      analyst-mcp:
        condition: service_started
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  runtime:
    build: services/langgraph-runtime
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  analyst-mcp:
    build: services/analyst-mcp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
